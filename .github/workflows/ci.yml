name: CI

# PARKED — GitHub Actions is disabled on this account pending a billing fix, so the
# auto-triggers are commented out to avoid a red ✗ on every push. The workflow is
# otherwise complete and verified-correct; re-enable by uncommenting push/pull_request.
# (You can still run it manually from the Actions tab via workflow_dispatch once billing
# is cleared.)
on:
  workflow_dispatch:
  # push:
  # pull_request:

jobs:
  test:
    name: kernel · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: kernel
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: kernel/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit + every demo under SES lockdown)
        run: pnpm test
